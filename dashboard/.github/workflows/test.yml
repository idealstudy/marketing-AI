name: Test

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

defaults:
  run:
    working-directory: dashboard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run
